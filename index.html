<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1e293b"/>
<title>Planilla de Asistencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#f1f5f9}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
  ::-webkit-scrollbar-track{background:transparent}
  button{font-family:'DM Sans',sans-serif}
  input,select{font-family:'DM Sans',sans-serif}
  button:active{opacity:.82;transform:scale(.98)}
  @keyframes fadeSlide{
    from{opacity:0;transform:translateX(-50%) translateY(-10px)}
    to{opacity:1;transform:translateX(-50%) translateY(0)}
  }
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef,useCallback,useEffect} = React;

// ── DATOS ────────────────────────────────────────────────────────────────────
const YEAR  = 2025;
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MES_INICIO = 2; // Marzo
const MES_FIN    = 11; // Diciembre
const DIAS_LETRA = ["D","L","M","M","J","V","S"];

const STATUS = {
  P:  {sym:"✔", label:"Presente",           color:"#16a34a", bg:"#dcfce7", bdr:"#bbf7d0"},
  A:  {sym:"✘", label:"Ausente",            color:"#dc2626", bg:"#fee2e2", bdr:"#fecaca"},
  TJ: {sym:"TJ",label:"Tardanza Justif.",   color:"#2563eb", bg:"#dbeafe", bdr:"#bfdbfe"},
  TI: {sym:"TI",label:"Tardanza Injustif.", color:"#d97706", bg:"#fef3c7", bdr:"#fde68a"},
};

const ESCUELAS_DEFAULT = [
  { id:"e1", nombre:"Escuela Primaria N°12", color:"#2563eb",
    cursos:{
      "1° A":["Acosta, Valentina","Benítez, Mateo","Cardozo, Sofía","Díaz, Lucas","Fernández, Emma","García, Tomás","Herrera, Lucía","López, Santiago","Martínez, Camila","Morales, Benjamín","Núñez, Isabella","Ortega, Joaquín","Pérez, Martina","Quiroga, Nicolás","Ramírez, Valeria"],
      "1° B":["Aguirre, Pablo","Blanco, Ana","Castro, Diego","Domínguez, Clara","Espinoza, Andrés","Flores, Julia","Gómez, Rodrigo","Ibáñez, Paula","Jiménez, Ignacio","Luna, Catalina"],
      "2° A":["Álvarez, Milagros","Bravo, Maximiliano","Campos, Fernanda","Delgado, Matías","Esteban, Rocío","Fuentes, Franco","González, Agustina","Heredia, Leandro","Inzunza, Natalia","Juárez, Facundo"],
      "3° A":["Andrade, Federico","Becerra, Tamara","Contreras, Emiliano","Dueñas, Agustina","Escobar, Mariano","Fonseca, Analía","Griffiths, Alejandro","Huergo, Florencia","Insúa, Claudio","Jurado, Mercedes"],
    }
  },
  { id:"e2", nombre:"Colegio Sec. San Martín", color:"#7c3aed",
    cursos:{
      "4° A":["Ahumada, Sebastián","Briones, Tatiana","Cervantes, Ulises","Domato, Viviana","Echevarría, Walter","Frías, Ximena","Godoy, Yamila","Haro, Zoe","Insaurralde, Adrián","Jaque, Bárbara"],
      "5° B":["Arce, Noemí","Bustos, Enzo","Coronel, Micaela","Darío, Leonardo","Escalante, Milagros","Franco, Nicolás","Guzmán, Valeria","Henríquez, Pablo","Iriarte, Dana","Jofré, Tomás"],
    }
  },
  { id:"e3", nombre:"Instituto Técnico Belgrano", color:"#059669",
    cursos:{
      "6° A":["Linares, Julián","Meza, Morena","Naranjo, Iván","Ovando, Lucía","Pacheco, Mauricio","Quirós, Elena","Rivera, Hernán","Salinas, Dana","Torres, Emilio","Vargas, Sofía"],
    }
  },
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const dateStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const hoy = new Date();
const HOY = dateStr(hoy);

function diasHabiles(year, month){
  const dias=[], d=new Date(year,month,1);
  while(d.getMonth()===month){ if(d.getDay()!==0&&d.getDay()!==6) dias.push(new Date(d)); d.setDate(d.getDate()+1); }
  return dias;
}

// ── COMPONENTES PEQUEÑOS ─────────────────────────────────────────────────────
function Avatar({name,idx,size=36}){
  const hue=(idx*53)%360;
  const pts=name.split(",").map(p=>p.trim());
  const ini=((pts[0]?.[0]||"")+(pts[1]?.[0]||"")).toUpperCase();
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:`hsl(${hue},55%,90%)`,border:`2px solid hsl(${hue},55%,68%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.3,fontWeight:800,color:`hsl(${hue},55%,28%)`,letterSpacing:"-.5px",userSelect:"none"}}>{ini}</div>;
}

function Toast({msg}){
  return <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"#f0fdf4",padding:"11px 28px",borderRadius:50,zIndex:9999,fontWeight:700,fontSize:14,boxShadow:"0 8px 40px rgba(0,0,0,.25)",border:"1px solid #22c55e55",display:"flex",alignItems:"center",gap:8,pointerEvents:"none",animation:"fadeSlide .25s ease"}}><span style={{color:"#22c55e",fontSize:16}}>✔</span>{msg}</div>;
}

function PestañaMes({mes,activo,tieneDatos,color,onClick}){
  return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:50,whiteSpace:"nowrap",border:activo?`2px solid ${color}`:"2px solid transparent",background:activo?color:tieneDatos?"#f0fdf4":"#f8fafc",color:activo?"#fff":tieneDatos?"#16a34a":"#94a3b8",fontSize:13,fontWeight:activo?800:600,cursor:"pointer",transition:"all .15s",position:"relative"}}>
    {MESES[mes].slice(0,3)}
    {tieneDatos&&!activo&&<span style={{position:"absolute",top:2,right:2,width:7,height:7,borderRadius:"50%",background:"#22c55e"}}/>}
  </button>;
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App(){
  const [escuelas,  setEscuelas]  = useState(ESCUELAS_DEFAULT);
  const [estId,     setEstId]     = useState(ESCUELAS_DEFAULT[0].id);
  const [curso,     setCurso]     = useState(Object.keys(ESCUELAS_DEFAULT[0].cursos)[0]);
  const [mes,       setMes]       = useState(Math.max(MES_INICIO,Math.min(hoy.getMonth(),MES_FIN)));
  const [pantalla,  setPantalla]  = useState("planilla");
  const [asistencia,setAsistencia]= useState({});
  const [toast,     setToast]     = useState(null);
  const [syncOpen,  setSyncOpen]  = useState(false);
  const [syncing,   setSyncing]   = useState(false);
  const [addEst,    setAddEst]    = useState(false);
  const [addCurso,  setAddCurso]  = useState(false);
  const [nuevoEst,  setNuevoEst]  = useState({nombre:"",color:"#3b82f6"});
  const [nuevoCurso,setNuevoCurso]= useState("");
  const [alumnoData,setAlumnoData]= useState(null);
  const [adjuntos,  setAdjuntos]  = useState({});
  const [filtro,    setFiltro]    = useState("");
  const toastRef = useRef();

  const est     = escuelas.find(e=>e.id===estId);
  const cursos  = est ? Object.keys(est.cursos) : [];
  const dias    = useMemo(()=>diasHabiles(YEAR,mes),[mes]);
  const acento  = est?.color||"#2563eb";

  const alumnos = useMemo(()=>{
    const todos = est?.cursos[curso]||[];
    if(!filtro.trim()) return todos;
    return todos.filter(a=>a.toLowerCase().includes(filtro.toLowerCase()));
  },[est,curso,filtro]);

  // Attendance helpers
  const aKey  = (a,d) => `${estId}|${curso}|${a}|${d}`;
  const getA  = (a,d) => asistencia[aKey(a,d)]||null;
  const setA  = (a,d,v) => setAsistencia(prev=>{const n={...prev},k=aKey(a,d);if(prev[k]===v)delete n[k];else n[k]=v;return n;});

  const marcarTodos = (dateS,st) => {
    setAsistencia(prev=>{const n={...prev};(est?.cursos[curso]||[]).forEach(a=>{n[aKey(a,dateS)]=st;});return n;});
    showToast(`${new Date(dateS+"T12:00").getDate()} ${MESES[mes]} → todos ${STATUS[st].label}`);
  };

  const showToast = (msg) => {
    if(toastRef.current) clearTimeout(toastRef.current);
    setToast(msg);
    toastRef.current=setTimeout(()=>setToast(null),2500);
  };

  const handleSync = (plat) => {
    setSyncOpen(false);setSyncing(true);
    setTimeout(()=>{setSyncing(false);showToast(`Sincronizado con ${plat} ✔`);},1800);
  };

  const statsAlumno = (alumno,c=curso,m=mes) => {
    let P=0,A=0,TJ=0,TI=0;
    diasHabiles(YEAR,m).forEach(d=>{
      const v=asistencia[`${estId}|${c}|${alumno}|${dateStr(d)}`];
      if(v==="P")P++;else if(v==="A")A++;else if(v==="TJ")TJ++;else if(v==="TI")TI++;
    });
    return {P,A,TJ,TI,total:diasHabiles(YEAR,m).length};
  };

  const statsdia = (dateS) => {
    const vals=(est?.cursos[curso]||[]).map(a=>getA(a,dateS));
    return {P:vals.filter(v=>v==="P").length,A:vals.filter(v=>v==="A").length,TJ:vals.filter(v=>v==="TJ").length,TI:vals.filter(v=>v==="TI").length};
  };

  const tieneDatos = (m) => Object.keys(asistencia).some(k=>k.startsWith(`${estId}|${curso}|`)&&k.includes(`|${YEAR}-${pad(m+1)}-`));

  // ── VISTA PLANILLA ────────────────────────────────────────────────────────
  const VistaPlanilla = () => (
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {/* Barra herramientas */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"10px 16px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
        <div style={{position:"relative",flex:"1 1 160px",minWidth:130}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",fontSize:13}}>🔍</span>
          <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar alumno…" style={{...inputSt,paddingLeft:30,width:"100%"}}/>
        </div>
        <span style={{fontSize:12,color:"#94a3b8",fontWeight:600,whiteSpace:"nowrap"}}>{alumnos.length} alumnos · {dias.length} días</span>
        <div style={{display:"flex",gap:5,marginLeft:"auto",flexWrap:"wrap"}}>
          {Object.entries(STATUS).map(([k,s])=>(
            <button key={k} onClick={()=>marcarTodos(HOY,k)} title={`Todos ${s.label} hoy`}
              style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${s.bdr}`,background:s.bg,color:s.color,fontWeight:800,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
              {s.sym} Hoy
            </button>
          ))}
        </div>
      </div>

      {/* Tabla */}
      <div style={{flex:1,overflow:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:"max-content"}}>
          <thead style={{position:"sticky",top:0,zIndex:20}}>
            <tr>
              <th style={thSt("#0f172a",72)}>Cód.</th>
              <th style={{...thSt("#0f172a",185),textAlign:"left",paddingLeft:12}}>Alumno</th>
              {dias.map(d=>(
                <th key={dateStr(d)} style={{background:dateStr(d)===HOY?acento:"#1e293b",color:"#fff",fontSize:10,padding:"4px 2px",textAlign:"center",minWidth:34,fontWeight:700,borderRight:"1px solid rgba(255,255,255,.08)"}}>
                  {DIAS_LETRA[d.getDay()]}
                </th>
              ))}
              {["Asist.","%","Faltas","TJ","TI"].map(h=>(
                <th key={h} style={{background:"#0f172a",color:"#64748b",fontSize:9,padding:"4px 6px",textAlign:"center",minWidth:50,whiteSpace:"nowrap",fontWeight:700,borderLeft:"2px solid #1e293b"}}>{h}</th>
              ))}
            </tr>
            <tr>
              <th style={thSt("#1e293b",72)}/>
              <th style={thSt("#1e293b",185)}/>
              {dias.map(d=>(
                <th key={dateStr(d)} style={{background:dateStr(d)===HOY?acento+"cc":"#334155",color:"#fff",fontSize:11,padding:"4px 2px",textAlign:"center",fontWeight:800,borderRight:"1px solid rgba(255,255,255,.08)"}}>
                  {d.getDate()}
                </th>
              ))}
              {[0,1,2,3,4].map(i=><th key={i} style={{background:"#0f172a"}}/>)}
            </tr>
          </thead>
          <tbody>
            {alumnos.map((alumno,si)=>{
              const ri=(est?.cursos[curso]||[]).indexOf(alumno);
              const st=statsAlumno(alumno);
              const pct=st.total?Math.round(st.P/st.total*100):0;
              const pc=pct>=80?"#16a34a":pct>=60?"#d97706":"#dc2626";
              const bg=si%2===0?"#f8fafc":"#fff";
              return (
                <tr key={alumno}>
                  <td style={{...tdSt(bg),color:"#64748b",fontSize:10,fontWeight:600}}>{`${ri+1}`.padStart(3,"0")}</td>
                  <td style={{...tdSt(bg),textAlign:"left",paddingLeft:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Avatar name={alumno} idx={ri} size={24}/>
                      <span style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{alumno}</span>
                    </div>
                  </td>
                  {dias.map(d=>{
                    const ds=dateStr(d),val=getA(alumno,ds),isHoy=ds===HOY;
                    return (
                      <td key={ds} style={{...tdSt(isHoy?acento+"0d":bg),padding:2,borderLeft:isHoy?`2px solid ${acento}44`:"1px solid #e2e8f0"}}>
                        <div style={{display:"flex",flexDirection:"column",gap:1,padding:"1px"}}>
                          {Object.entries(STATUS).map(([k,cfg])=>(
                            <button key={k} onClick={()=>setA(alumno,ds,k)} title={cfg.label}
                              style={{height:17,borderRadius:3,margin:"0 1px",border:val===k?`1.5px solid ${cfg.color}`:"1px solid #e2e8f0",background:val===k?cfg.bg:"transparent",color:val===k?cfg.color:"#d1d5db",fontSize:k==="TJ"||k==="TI"?6:9,fontWeight:900,cursor:"pointer",transition:"all .1s",padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {cfg.sym}
                            </button>
                          ))}
                        </div>
                      </td>
                    );
                  })}
                  <td style={{...tdStat,color:"#16a34a"}}>{st.P}</td>
                  <td style={{...tdStat,color:pc,fontSize:11,fontWeight:800}}>{pct}%</td>
                  <td style={{...tdStat,color:"#dc2626"}}>{st.A}</td>
                  <td style={{...tdStat,color:"#2563eb"}}>{st.TJ}</td>
                  <td style={{...tdStat,color:"#d97706"}}>{st.TI}</td>
                </tr>
              );
            })}
            {/* Fila totales */}
            <tr>
              <td colSpan={2} style={{background:"#0f172a",color:"#64748b",fontSize:10,fontWeight:700,textAlign:"right",padding:"5px 12px",borderTop:"2px solid #334155"}}>Total del día ↓</td>
              {dias.map(d=>{
                const ds=dateStr(d),st=statsdia(ds);
                return <td key={ds} style={{background:"#1e293b",padding:"2px 1px",borderTop:"2px solid #334155",borderRight:"1px solid #334155",textAlign:"center",verticalAlign:"middle"}}>
                  {Object.entries(STATUS).map(([k,cfg])=><div key={k} style={{fontSize:8,color:cfg.color,fontWeight:800,lineHeight:1.6}}>{st[k]||0}</div>)}
                </td>;
              })}
              {[0,1,2,3,4].map(i=><td key={i} style={{background:"#0f172a",borderTop:"2px solid #334155"}}/>)}
            </tr>
          </tbody>
        </table>
      </div>

      {/* Leyenda */}
      <div style={{background:"#fff",borderTop:"1px solid #e2e8f0",padding:"8px 16px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:1}}>LEYENDA</span>
        {Object.entries(STATUS).map(([k,s])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:22,height:22,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",background:s.bg,border:`1.5px solid ${s.color}`,color:s.color,fontWeight:900,fontSize:9}}>{s.sym}</div>
            <span style={{fontSize:12,color:"#64748b"}}>{s.label}</span>
          </div>
        ))}
      </div>
    </div>
  );

  // ── VISTA RESUMEN ─────────────────────────────────────────────────────────
  const VistaResumen = () => {
    const todos=est?.cursos[curso]||[];
    return (
      <div style={{flex:1,overflow:"auto",padding:16,background:"#f8fafc"}}>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"14px 18px",marginBottom:16,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{flex:1,minWidth:160}}>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Resumen mensual</div>
            <div style={{fontSize:18,fontWeight:800,color:"#1e293b",fontFamily:"'Syne',sans-serif"}}>{MESES[mes]} {YEAR}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:3}}>{est?.nombre} · {curso} · {todos.length} alumnos</div>
          </div>
          {Object.entries(STATUS).map(([k,s])=>{
            const tot=todos.reduce((acc,a)=>acc+statsAlumno(a)[k],0);
            return <div key={k} style={{textAlign:"center",padding:"8px 14px",background:s.bg,borderRadius:12,border:`1px solid ${s.bdr}`}}>
              <div style={{fontSize:22,fontWeight:900,color:s.color,fontFamily:"'Syne',sans-serif"}}>{tot}</div>
              <div style={{fontSize:10,color:s.color,fontWeight:700}}>{s.label}</div>
            </div>;
          })}
        </div>
        {todos.map((alumno,i)=>{
          const st=statsAlumno(alumno);
          const pct=st.total?Math.round(st.P/st.total*100):0;
          const pc=pct>=80?"#16a34a":pct>=60?"#d97706":"#dc2626";
          return <div key={alumno} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"13px 15px",marginBottom:9,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
            <Avatar name={alumno} idx={i} size={42}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:5}}>{alumno}</div>
              <div style={{display:"flex",gap:12,marginBottom:5,flexWrap:"wrap"}}>
                {Object.entries(STATUS).map(([k,cfg])=><span key={k} style={{fontSize:12,color:cfg.color,fontWeight:700}}>{cfg.sym} {st[k]}</span>)}
                <span style={{fontSize:12,color:"#94a3b8"}}>/ {st.total} días</span>
              </div>
              <div style={{height:5,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:pc,borderRadius:5,transition:"width .5s"}}/>
              </div>
            </div>
            <div style={{fontSize:20,fontWeight:900,color:pc,fontFamily:"'Syne',sans-serif",minWidth:48,textAlign:"right"}}>{pct}%</div>
          </div>;
        })}
      </div>
    );
  };

  // ── VISTA DATOS ───────────────────────────────────────────────────────────
  const VistaDatos = () => {
    const fileRef=useRef();
    if(alumnoData){
      const aK=`${estId}|${alumnoData.curso}|${alumnoData.alumno}`;
      const files=adjuntos[aK]||[];
      const si=(est?.cursos[alumnoData.curso]||[]).indexOf(alumnoData.alumno);
      const historial=Array.from({length:MES_FIN-MES_INICIO+1},(_,i)=>{
        const m=MES_INICIO+i;
        const st=statsAlumno(alumnoData.alumno,alumnoData.curso,m);
        return {mes:m,...st,pct:st.total?Math.round(st.P/st.total*100):null};
      });
      return (
        <div style={{flex:1,overflow:"auto",padding:16,background:"#f8fafc"}}>
          <button onClick={()=>setAlumnoData(null)} style={backBtnSt(acento)}>← Volver</button>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"16px 18px",margin:"12px 0 16px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <Avatar name={alumnoData.alumno} idx={si} size={52}/>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:"#1e293b"}}>{alumnoData.alumno}</div>
              <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{alumnoData.curso} · {est?.nombre}</div>
            </div>
          </div>
          {/* Resumen anual */}
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Resumen Marzo–Diciembre {YEAR}</div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
              {historial.map(h=>{
                const pc=h.pct===null?"#cbd5e1":h.pct>=80?"#16a34a":h.pct>=60?"#d97706":"#dc2626";
                return <div key={h.mes} style={{flex:"0 0 auto",textAlign:"center",background:h.pct===null?"#f8fafc":h.pct>=80?"#f0fdf4":h.pct>=60?"#fffbeb":"#fef2f2",border:`1px solid ${h.pct===null?"#e2e8f0":h.pct>=80?"#bbf7d0":h.pct>=60?"#fde68a":"#fecaca"}`,borderRadius:10,padding:"8px 10px",minWidth:56}}>
                  <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,marginBottom:3}}>{MESES[h.mes].slice(0,3)}</div>
                  <div style={{fontSize:15,fontWeight:900,color:pc,fontFamily:"'Syne',sans-serif"}}>{h.pct===null?"—":h.pct+"%"}</div>
                  <div style={{fontSize:8,color:"#94a3b8",marginTop:2}}>P:{h.P} A:{h.A}</div>
                </div>;
              })}
            </div>
          </div>
          {/* Adjuntos */}
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Archivos adjuntos</div>
            <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e=>{
              Array.from(e.target.files).forEach(f=>{
                const r=new FileReader();
                r.onload=ev=>setAdjuntos(prev=>({...prev,[aK]:[...(prev[aK]||[]),{id:Date.now()+Math.random(),name:f.name,type:f.type,size:f.size,dataUrl:ev.target.result,fecha:new Date().toLocaleDateString("es-AR"),nota:""}]}));
                r.readAsDataURL(f);
              });
              e.target.value="";
            }}/>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"13px",background:`${acento}08`,border:`2px dashed ${acento}44`,borderRadius:12,color:acento,fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20}}>+</span> Adjuntar archivo
            </button>
            {files.length===0
              ? <div style={{textAlign:"center",padding:"24px 0",color:"#94a3b8"}}><div style={{fontSize:32,marginBottom:6}}>📎</div><div style={{fontWeight:600}}>Sin archivos</div><div style={{fontSize:12,marginTop:4}}>Adjuntá documentos, imágenes o notas</div></div>
              : files.map(f=>{
                const ico=f.type?.includes("image")?"🖼️":f.type?.includes("pdf")?"📄":f.type?.includes("sheet")||f.type?.includes("excel")?"📊":"📎";
                return <div key={f.id} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:11,padding:"12px 13px",marginBottom:9}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:26}}>{ico}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                      <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{(f.size/1000).toFixed(0)} KB · {f.fecha}</div>
                    </div>
                    <button onClick={()=>setAdjuntos(prev=>({...prev,[aK]:(prev[aK]||[]).filter(a=>a.id!==f.id)}))}
                      style={{background:"#fee2e2",border:"none",borderRadius:7,width:30,height:30,color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:800}}>✕</button>
                  </div>
                  <input placeholder="Nota sobre este archivo…" value={f.nota}
                    onChange={e=>setAdjuntos(prev=>({...prev,[aK]:(prev[aK]||[]).map(a=>a.id===f.id?{...a,nota:e.target.value}:a)}))}
                    style={{...inputSt,width:"100%",marginTop:9}}/>
                  {f.type?.includes("image")&&<img src={f.dataUrl} alt={f.name} style={{width:"100%",borderRadius:9,marginTop:9,maxHeight:200,objectFit:"cover"}}/>}
                </div>;
              })
            }
          </div>
        </div>
      );
    }
    // Lista de alumnos
    return (
      <div style={{flex:1,overflow:"auto",padding:16,background:"#f8fafc"}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14,fontWeight:600}}>Seleccioná un alumno — {est?.nombre}</div>
        {cursos.map(c=>(
          <div key={c}>
            <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:acento,fontWeight:800,margin:"16px 0 7px",display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,height:1,background:acento+"22"}}/>
              {c}
              <div style={{flex:1,height:1,background:acento+"22"}}/>
            </div>
            {(est?.cursos[c]||[]).map((a,i)=>{
              const aK=`${estId}|${c}|${a}`;
              const cnt=(adjuntos[aK]||[]).length;
              const st=statsAlumno(a,c);
              const pct=st.total?Math.round(st.P/st.total*100):null;
              return <button key={a} onClick={()=>{setCurso(c);setAlumnoData({alumno:a,curso:c});}}
                style={{width:"100%",background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"11px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:11,cursor:"pointer",textAlign:"left",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <Avatar name={a} idx={i} size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                    {cnt>0?`📎 ${cnt} archivo${cnt!==1?"s":""}  · `:""}
                    {pct!==null?`${MESES[mes]}: ${pct}% asistencia`:"Sin datos"}
                  </div>
                </div>
                <span style={{color:"#cbd5e1",fontSize:18}}>›</span>
              </button>;
            })}
          </div>
        ))}
      </div>
    );
  };

  // ── RENDER PRINCIPAL ──────────────────────────────────────────────────────
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#f1f5f9",overflow:"hidden"}}>
      {toast && <Toast msg={toast}/>}

      {/* TOP BAR */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0,minHeight:54,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginRight:4,flexShrink:0}}>
          <div style={{width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${acento},${acento}99)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📋</div>
          <div style={{lineHeight:1}}>
            <div style={{fontSize:13,fontWeight:800,color:"#1e293b",fontFamily:"'Syne',sans-serif"}}>Asistencia</div>
            <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,letterSpacing:1}}>SISTEMA ESCOLAR</div>
          </div>
        </div>
        {/* Escuelas */}
        <div style={{display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none",flex:1}}>
          {escuelas.map(e=>(
            <button key={e.id} onClick={()=>{setEstId(e.id);setCurso(Object.keys(e.cursos)[0]);setAlumnoData(null);}}
              style={{padding:"5px 12px",borderRadius:50,whiteSpace:"nowrap",border:`1.5px solid ${estId===e.id?e.color:"#e2e8f0"}`,background:estId===e.id?e.color+"18":"transparent",color:estId===e.id?e.color:"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
              {e.nombre}
            </button>
          ))}
          <button onClick={()=>setAddEst(!addEst)} style={{padding:"5px 10px",borderRadius:50,whiteSpace:"nowrap",border:"1.5px dashed #cbd5e1",background:"transparent",color:"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Escuela</button>
        </div>
        {/* Sync */}
        <div style={{position:"relative",flexShrink:0}}>
          <button onClick={()=>setSyncOpen(!syncOpen)} style={{padding:"7px 12px",borderRadius:9,background:syncing?acento:"#f8fafc",border:`1.5px solid ${syncing?acento:"#e2e8f0"}`,color:syncing?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:13,display:"inline-block",animation:syncing?"spin 1s linear infinite":""}}>{syncing?"⟳":"⇅"}</span>
            {syncing?"Sync…":"Sync"}
          </button>
          {syncOpen&&(
            <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,overflow:"hidden",minWidth:200,boxShadow:"0 12px 40px rgba(0,0,0,.12)",zIndex:300}}>
              {[{name:"Google Sheets",icon:"🟢",sub:"Google Drive"},{name:"Microsoft Excel",icon:"🟩",sub:"OneDrive"}].map(o=>(
                <button key={o.name} onClick={()=>handleSync(o.name)}
                  style={{width:"100%",padding:"12px 16px",background:"none",border:"none",borderBottom:"1px solid #f1f5f9",color:"#1e293b",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:10,fontSize:13}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:18}}>{o.icon}</span>
                  <div><div style={{fontWeight:700}}>{o.name}</div><div style={{fontSize:11,color:"#94a3b8"}}>{o.sub}</div></div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Add escuela */}
      {addEst&&(
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"9px 16px",display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          <input value={nuevoEst.nombre} onChange={e=>setNuevoEst(p=>({...p,nombre:e.target.value}))} placeholder="Nombre del establecimiento" style={{...inputSt,flex:"1 1 180px"}}/>
          <input type="color" value={nuevoEst.color} onChange={e=>setNuevoEst(p=>({...p,color:e.target.value}))} style={{width:36,height:36,borderRadius:9,border:"1px solid #e2e8f0",cursor:"pointer",padding:3}}/>
          <button onClick={()=>{if(!nuevoEst.nombre.trim())return;const id="e"+Date.now();setEscuelas(p=>[...p,{id,nombre:nuevoEst.nombre.trim(),color:nuevoEst.color,cursos:{}}]);setEstId(id);setNuevoEst({nombre:"",color:"#3b82f6"});setAddEst(false);showToast("Establecimiento agregado ✔");}} style={primaryBtnSt(acento)}>Agregar</button>
          <button onClick={()=>setAddEst(false)} style={ghostBtnSt}>Cancelar</button>
        </div>
      )}

      {/* SEGUNDA BARRA */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 16px",display:"flex",alignItems:"center",gap:7,flexShrink:0,minHeight:44,flexWrap:"wrap"}}>
        <select value={curso} onChange={e=>{setCurso(e.target.value);setAlumnoData(null);}} style={{...inputSt,fontWeight:700,minWidth:80}}>
          {cursos.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <button onClick={()=>setAddCurso(!addCurso)} style={{padding:"5px 9px",borderRadius:7,border:"1.5px dashed #cbd5e1",background:"transparent",color:"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Curso</button>
        <div style={{width:1,height:20,background:"#e2e8f0"}}/>
        {[{id:"planilla",label:"📋 Planilla"},{id:"resumen",label:"📊 Resumen"},{id:"datos",label:"🗂️ Datos"}].map(t=>(
          <button key={t.id} onClick={()=>{setPantalla(t.id);setAlumnoData(null);}}
            style={{padding:"5px 13px",borderRadius:50,border:"none",background:pantalla===t.id?acento:"transparent",color:pantalla===t.id?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Add curso */}
      {addCurso&&(
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"9px 16px",display:"flex",gap:7}}>
          <input value={nuevoCurso} onChange={e=>setNuevoCurso(e.target.value)} placeholder="Ej: 4° B" style={{...inputSt,width:130}} onKeyDown={e=>{if(e.key==="Enter"&&nuevoCurso.trim()){setEscuelas(p=>p.map(es=>es.id===estId?{...es,cursos:{...es.cursos,[nuevoCurso.trim()]:[]}}:es));setCurso(nuevoCurso.trim());setNuevoCurso("");setAddCurso(false);showToast(`Curso ${nuevoCurso.trim()} creado`);}}}/>
          <button onClick={()=>{if(!nuevoCurso.trim())return;setEscuelas(p=>p.map(es=>es.id===estId?{...es,cursos:{...es.cursos,[nuevoCurso.trim()]:[]}}:es));setCurso(nuevoCurso.trim());setNuevoCurso("");setAddCurso(false);showToast(`Curso ${nuevoCurso.trim()} creado`);}} style={primaryBtnSt(acento)}>Agregar</button>
          <button onClick={()=>setAddCurso(false)} style={ghostBtnSt}>Cancelar</button>
        </div>
      )}

      {/* PESTAÑAS DE MESES */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"7px 16px",display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",flexShrink:0}}>
        {Array.from({length:MES_FIN-MES_INICIO+1},(_,i)=>MES_INICIO+i).map(m=>(
          <PestañaMes key={m} mes={m} activo={mes===m} tieneDatos={tieneDatos(m)} color={acento} onClick={()=>setMes(m)}/>
        ))}
      </div>

      {/* CONTENIDO */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {pantalla==="planilla"&&<VistaPlanilla/>}
        {pantalla==="resumen" &&<VistaResumen/>}
        {pantalla==="datos"   &&<VistaDatos/>}
      </div>
    </div>
  );
}

// ── ESTILOS ÁTOMO ─────────────────────────────────────────────────────────────
const inputSt={background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",color:"#1e293b",fontSize:12,outline:"none"};
const thSt=(bg,minW)=>({background:bg,color:"#fff",fontSize:10,padding:"5px 7px",textAlign:"center",minWidth:minW,fontWeight:700,borderRight:"1px solid rgba(255,255,255,.07)"});
const tdSt=(bg)=>({padding:"5px 7px",borderRight:"1px solid #e2e8f0",borderBottom:"1px solid #e2e8f0",background:bg,textAlign:"center",verticalAlign:"middle"});
const tdStat={padding:"5px 7px",borderRight:"1px solid #e2e8f0",borderBottom:"1px solid #e2e8f0",background:"#f8fafc",textAlign:"center",verticalAlign:"middle",fontWeight:700,fontSize:12,borderLeft:"2px solid #e2e8f0"};
const primaryBtnSt=(c)=>({padding:"7px 16px",background:c,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"});
const ghostBtnSt={padding:"7px 12px",background:"transparent",border:"1px solid #e2e8f0",borderRadius:8,color:"#64748b",fontWeight:600,fontSize:12,cursor:"pointer"};
const backBtnSt=(c)=>({padding:"7px 16px",background:`${c}10`,border:`1px solid ${c}30`,borderRadius:8,color:c,fontWeight:700,fontSize:12,cursor:"pointer"});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
